<!DOCTYPE html>
<html>
<head>
    <title>Web Extractor Pro</title>
    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        form {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 60%;
            padding: 12px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        .box {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        img {
            max-width: 150px;
            margin: 5px;
            border-radius: 10px;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        .scroll {
            max-height: 300px;
            overflow: auto;
        }
    </style>
</head>
<body>

<h1>🌐 Web Extractor Pro</h1>

<form method="POST">
    <input name="url" placeholder="https://example.com">
    <button>ดึงข้อมูล</button>
</form>

{% if result %}
<div class="box">

    <h2>{{ result.title }}</h2>

    <h3>📌 สรุป (สั้น)</h3>
    <p>{{ result.summary }}</p>

    <h3>📄 เนื้อหา (ครบ)</h3>
    <div class="scroll">
        <p>{{ result.full_text }}</p>
    </div>

    <h3>🖼 รูป</h3>
    <div class="scroll">
        {% for img in result.images %}
            <img src="{{ img }}">
        {% endfor %}
    </div>

    <h3>🔗 ลิงก์</h3>
    <div class="scroll">
        {% for link in result.links %}
            <div>
                <a href="{{ link.url }}" target="_blank">
                    🔗 {{ link.text }}
                </a>
            </div>
        {% endfor %}
    </div>

</div>
{% endif %}

</body>
</html>
